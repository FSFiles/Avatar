<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvaForge — AI Avatar Video Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:#E8D590;--g3:rgba(201,168,76,.12);--g4:rgba(201,168,76,.06);
  --bg:#05080F;--bg2:#0A0E1A;--bg3:#0F1525;
  --tx:#EDE8DF;--tm:rgba(237,232,223,.55);--td:rgba(237,232,223,.28);--tdd:rgba(237,232,223,.13);
  --b:rgba(201,168,76,.13);--bh:rgba(201,168,76,.32);--bs:rgba(201,168,76,.5);
  --red:#E24B4A;--grn:#3DBE7A;
}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#root{min-height:100vh;position:relative;z-index:1}
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.035) 1px,transparent 1px);background-size:52px 52px}
.bg-o1{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.065) 0%,transparent 68%);top:-250px;left:-200px}
.bg-o2{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(70,50,180,.055) 0%,transparent 68%);bottom:-200px;right:-180px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ticker{0%{transform:translateX(110%)}100%{transform:translateX(-110%)}}
@keyframes wavebar{0%{height:4px}100%{height:22px}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fadein{animation:fadeUp .35s ease both}
/* BUTTONS */
.btn-gold{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,#C9A84C,#A07830);color:#050810;font-weight:600;font-size:13px;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.2px;transition:transform .2s,box-shadow .2s,opacity .2s;position:relative}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(201,168,76,.28)}
.btn-gold:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 22px;background:transparent;border:1px solid var(--b);color:var(--tm);font-size:12px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-outline:hover{border-color:var(--bh);color:var(--tx);background:var(--g4)}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;background:transparent;border:1px solid var(--b);color:var(--tm);font-size:12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-ghost:hover{border-color:var(--bh);color:var(--tx)}
.btn-dl{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:rgba(61,190,122,.08);border:1px solid rgba(61,190,122,.3);color:var(--grn);font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-dl:hover{background:rgba(61,190,122,.16)}
.btn-dl:disabled{opacity:.5;cursor:not-allowed}
/* TAG */
.tag{display:inline-flex;align-items:center;padding:4px 14px;border:1px solid rgba(201,168,76,.32);border-radius:100px;font-size:10px;font-weight:600;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase}
.badge-ok{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:rgba(61,190,122,.1);border:1px solid rgba(61,190,122,.28);border-radius:100px;font-size:11px;color:var(--grn)}
.badge-gold{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--g3);border:1px solid var(--b);border-radius:100px;font-size:10px;color:var(--gold);font-weight:600}
/* LOADING */
.spinner{width:34px;height:34px;border:2.5px solid rgba(201,168,76,.18);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite}
.load-full{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;border-bottom:1px solid var(--b);background:rgba(5,8,15,.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:200;gap:14px}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,#C9A84C,#E8D590,#C9A84C);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;animation:shimmer 4s linear infinite}
.nav-links{display:flex;align-items:center;gap:2px;flex:1}
.nl{padding:7px 13px;font-size:12px;font-weight:500;color:var(--tm);border-radius:6px;cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;transition:all .18s;white-space:nowrap}
.nl:hover{color:var(--tx);background:rgba(255,255,255,.04)}
.nl.active{color:var(--gold);background:var(--g3)}
.nl.cta{background:linear-gradient(135deg,#C9A84C,#A07830);color:#050810;font-weight:700;margin-left:6px}
.nl.cta:hover{opacity:.88;transform:translateY(-1px)}
.nav-prof{display:flex;align-items:center;gap:8px;padding:5px 11px 5px 7px;background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:10px;cursor:pointer;transition:all .2s;flex-shrink:0;position:relative}
.nav-prof:hover{border-color:var(--bh)}
.nav-av{width:28px;height:28px;border-radius:6px;background:var(--g3);border:1px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:15px}
.nav-pname{font-size:12px;font-weight:600;color:var(--tx);line-height:1}
.nav-pplan{font-size:10px;color:var(--gold);display:flex;align-items:center;gap:3px;margin-top:1px}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
.dd{position:absolute;top:calc(100% + 8px);right:0;background:rgba(10,14,26,.98);border:1px solid var(--b);border-radius:10px;min-width:175px;padding:5px;backdrop-filter:blur(20px);z-index:300;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .15s ease both}
.ddi{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:7px;font-size:12px;color:var(--tm);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.ddi:hover{background:rgba(255,255,255,.05);color:var(--tx)}
.ddi.red:hover{background:rgba(226,75,74,.08);color:var(--red)}
.dd-sep{height:1px;background:var(--b);margin:3px 0}
/* LANDING */
.land-nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:transparent;position:fixed;top:0;left:0;right:0;z-index:200;transition:all .3s}
.land-nav.scrolled{background:rgba(5,8,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--b)}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;position:relative}
.hero-tag{display:inline-flex;align-items:center;gap:8px;padding:5px 16px;border:1px solid rgba(201,168,76,.3);border-radius:100px;font-size:10px;font-weight:600;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:26px;background:rgba(201,168,76,.06)}
.hero-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(44px,8vw,84px);font-weight:700;line-height:1.02;background:linear-gradient(180deg,#fff 0%,#E8D590 45%,#C9A84C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
.hero-sub{font-size:clamp(14px,2vw,16px);color:var(--tm);max-width:480px;line-height:1.85;margin:0 auto 36px;font-weight:300}
.hero-btns{display:flex;align-items:center;gap:11px;flex-wrap:wrap;justify-content:center;margin-bottom:56px}
.hero-stats{display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center}
.hs-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--gold);line-height:1}
.hs-lbl{font-size:11px;color:var(--td);margin-top:3px}
.hs-div{width:1px;height:36px;background:var(--b)}
/* SECTIONS */
.section{padding:72px 40px;max-width:1100px;margin:0 auto}
.sec-eyebrow{text-align:center;margin-bottom:10px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,5vw,46px);font-weight:700;background:linear-gradient(180deg,#fff 0%,#C9A84C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:12px}
.sec-sub{text-align:center;font-size:13px;color:var(--tm);max-width:400px;margin:0 auto 44px;line-height:1.85;font-weight:300}
.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1px;background:var(--b);border:1px solid var(--b);border-radius:14px;overflow:hidden}
.step-item{background:var(--bg2);padding:26px 22px;transition:background .2s}
.step-item:hover{background:var(--bg3)}
.step-n{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:700;color:rgba(201,168,76,.18);line-height:1;margin-bottom:9px}
.step-icon{font-size:22px;margin-bottom:9px}
.step-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:5px}
.step-desc{font-size:12px;color:var(--tm);line-height:1.7}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:13px}
.fc{background:var(--bg2);border:1px solid var(--b);border-radius:13px;padding:22px;transition:all .22s}
.fc:hover{border-color:var(--bh);background:var(--bg3);transform:translateY(-3px)}
.fc-icon{width:44px;height:44px;border-radius:10px;background:var(--g3);border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:13px}
.fc-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:5px}
.fc-desc{font-size:12px;color:var(--tm);line-height:1.75}
.fc-tag{display:inline-flex;margin-top:9px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600}
.fc-free{background:rgba(61,190,122,.1);color:var(--grn)}
.fc-pro{background:rgba(130,100,220,.12);color:#a088e8}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:620px;margin:0 auto}
.pc{background:var(--bg2);border:1px solid var(--b);border-radius:13px;padding:22px}
.pc.feat{border-color:rgba(201,168,76,.35);background:var(--bg3)}
.pc-name{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.pc-price{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;color:var(--gold);margin-bottom:14px}
.pc-price small{font-size:13px;font-weight:400;color:var(--tm);font-family:'DM Sans',sans-serif}
.pc-feat{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--tm);padding:5px 0;border-bottom:1px solid var(--b)}
.pc-feat:last-child{border-bottom:none}
.pf-y{color:var(--grn);font-size:11px}
.pf-n{color:var(--tdd);font-size:11px}
.cta-sec{text-align:center;padding:72px 24px;border-top:1px solid var(--b)}
.cta-h{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,5vw,50px);font-weight:700;background:linear-gradient(180deg,#fff,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
.cta-sub{font-size:13px;color:var(--tm);max-width:360px;margin:0 auto 28px;line-height:1.85;font-weight:300}
.footer{border-top:1px solid var(--b);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.fl-link{font-size:12px;color:var(--td);cursor:pointer;transition:color .2s;display:inline-block}
.fl-link:hover{color:var(--tm)}
/* AUTH */
.auth-page{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.auth-left{display:flex;flex-direction:column;justify-content:center;padding:52px 44px;background:linear-gradient(160deg,rgba(10,14,26,.96),rgba(5,8,15,.98));border-right:1px solid var(--b)}
.auth-h{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4vw,44px);font-weight:700;line-height:1.1;background:linear-gradient(180deg,#fff 0%,#C9A84C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:13px}
.auth-p{font-size:13px;color:var(--tm);line-height:1.85;max-width:320px;margin-bottom:36px;font-weight:300}
.auth-feats{display:flex;flex-direction:column;gap:12px}
.af{display:flex;align-items:center;gap:10px}
.af-icon{width:32px;height:32px;border-radius:7px;background:var(--g3);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.af-t{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:1px}
.af-d{font-size:11px;color:var(--td)}
.auth-right{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px;background:var(--bg)}
.auth-card{width:100%;max-width:390px}
.auth-tabs{display:flex;background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:9px;padding:3px;margin-bottom:24px}
.at{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:500;border-radius:7px;cursor:pointer;color:var(--td);border:none;background:transparent;font-family:'DM Sans',sans-serif;transition:all .2s}
.at.on{background:linear-gradient(135deg,#C9A84C,#A07830);color:#050810;font-weight:700}
.ftitle{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;background:linear-gradient(180deg,#fff,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.fsub{font-size:12px;color:var(--tm);margin-bottom:18px;line-height:1.65;font-weight:300}
.field{margin-bottom:12px}
.flbl{display:block;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:5px}
.fw{position:relative}
.fi{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;opacity:.4}
.finp{width:100%;padding:11px 14px 11px 38px;background:rgba(255,255,255,.035);border:1px solid rgba(201,168,76,.14);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.finp:focus{border-color:var(--bs)}
.finp::placeholder{color:var(--td)}
.finp.err{border-color:var(--red)}
.finp.ok{border-color:var(--grn)}
.pw-tog{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--td);cursor:pointer;font-size:13px}
.emsg{font-size:11px;color:var(--red);margin-top:4px}
.omsg{font-size:11px;color:var(--grn);margin-top:4px}
.sbars{display:flex;gap:3px;margin-top:5px;margin-bottom:2px}
.sbar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.07);transition:background .3s}
.slbl{font-size:10px}
.opts-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.chk{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.chk-box{width:14px;height:14px;border:1px solid rgba(201,168,76,.28);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;flex-shrink:0}
.chk-box.on{background:var(--gold);border-color:var(--gold);color:#050810}
.chk-lbl{font-size:11px;color:var(--tm)}
.forgot{font-size:11px;color:var(--gold);cursor:pointer}
.divider{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.div-line{flex:1;height:1px;background:var(--b)}
.div-txt{font-size:11px;color:var(--td)}
.soc-row{display:flex;gap:8px;margin-bottom:13px}
.soc-btn{flex:1;padding:9px;background:rgba(255,255,255,.028);border:1px solid var(--b);border-radius:8px;color:var(--tm);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}
.soc-btn:hover{border-color:var(--bh);color:var(--tx)}
.sw-prompt{text-align:center;font-size:11px;color:var(--td)}
.sw-link{color:var(--gold);cursor:pointer;font-weight:500}
.avp-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.avp{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.04);transition:all .15s}
.avp.on{border-color:var(--gold);background:var(--g3)}
.err-box{padding:10px 13px;background:rgba(226,75,74,.07);border:1px solid rgba(226,75,74,.28);border-radius:8px;font-size:12px;color:var(--red);margin-bottom:11px;line-height:1.6}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
/* DASHBOARD */
.home-hero{text-align:center;padding:48px 24px 34px}
.home-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,6vw,60px);font-weight:700;line-height:1.04;background:linear-gradient(180deg,#fff 0%,#C9A84C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:11px}
.home-sub{font-size:13px;color:var(--tm);max-width:380px;margin:0 auto 24px;line-height:1.85;font-weight:300}
.stats-strip{display:flex;justify-content:center;gap:26px;padding:0 24px 38px;flex-wrap:wrap}
.ss-icon{font-size:19px;margin-bottom:5px}
.ss-title{font-size:11px;font-weight:600;color:var(--gold);margin-bottom:2px}
.ss-desc{font-size:10px;color:var(--td);line-height:1.5}
.sh{padding:26px 32px 16px}
.sh-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.sh-sub{font-size:11px;color:var(--td)}
.vids-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:13px;padding:0 32px 56px}
.vid-card{background:var(--bg2);border:1px solid var(--b);border-radius:11px;overflow:hidden;cursor:pointer;transition:all .22s}
.vid-card:hover{border-color:var(--bh);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.4)}
.vid-card:hover .play-overlay{opacity:1!important}
.vid-thumb{height:148px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0A1328,#180A2A);position:relative}
.vid-lang{position:absolute;top:7px;right:7px;padding:2px 7px;background:rgba(0,0,0,.6);border:1px solid var(--b);border-radius:100px;font-size:10px;color:var(--gold)}
.vid-body{padding:10px 11px}
.vid-t{font-size:12px;font-weight:500;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vid-s{font-size:10px;color:var(--td);margin-bottom:6px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.vid-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--gold)}
/* FLOW */
.flow-wrap{max-width:680px;margin:0 auto;padding:28px 16px 56px}
.card{background:var(--bg2);border:1px solid var(--b);border-radius:13px;padding:22px}
.steps-bar{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:24px;flex-wrap:wrap;row-gap:6px}
.sn{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--td);transition:color .3s}
.sn.active{color:var(--gold)}
.sn.done{color:rgba(201,168,76,.5)}
.sdot{width:19px;height:19px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.sdash{width:26px;height:1px;background:var(--b);margin:0 4px}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:5px}
.inp{width:100%;padding:11px 13px;background:rgba(255,255,255,.035);border:1px solid rgba(201,168,76,.14);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--bs)}

/* ── Studio ── */
const STEPS=['Title','Script','Customize','Voice','Video'];
const SIDX={title:0,script:1,customize:2,voice:3,generating:4,video:4};

function Studio({authUser,profile,setProfile,onLogout}){
  const [screen,setScreen]=useState('home');
  const [videos,setVideos]=useState([]);
  const [vLoad,setVLoad]=useState(true);
  const [title,setTitle]=useState('');
  const [sLang,setSLang]=useState('English');
  const [scriptVal,setSV]=useState('');
  const [sLoad,setSLoad]=useState(false);
  const [scriptErr,setScriptErr]=useState('');
  const [scriptMode,setScriptMode]=useState(null); // null=choose, 'ai'=generate, 'manual'=write own
  const [cfg,setCfg]=useState({...DEF});
  const [voice,setVoice]=useState(null);
  const [speaking,setSpeaking]=useState(false);
  const [prog,setProg]=useState(0);
  const [mp4Load,setMp4Load]=useState(false);
  const [mp4Prog,setMp4Prog]=useState(0);
  const [mp4Done,setMp4Done]=useState(false);
  const [playingVid,setPlayingVid]=useState(null);
  const [playSpeak,setPlaySpeak]=useState(false);
  const progRef=useRef(null);
  const uc=(k,v)=>setCfg(c=>({...c,[k]:v}));

  // Load videos
  useEffect(()=>{
    (async()=>{setVLoad(true);const{data}=await db.from('videos').select('*').order('created_at',{ascending:false}).limit(24);if(data)setVideos(data.map(mapV));setVLoad(false);})();
  },[]);

  // Speech API
  const VMAP={David:{lang:'en-US',pitch:.95,rate:.92},James:{lang:'en-GB',pitch:.88,rate:.9},Emma:{lang:'en-US',pitch:1.15,rate:.94},Sophie:{lang:'en-GB',pitch:1.18,rate:.92},Arjun:{lang:'ta-IN',pitch:.9,rate:.88},Kumar:{lang:'ta-IN',pitch:.85,rate:.86},Priya:{lang:'ta-IN',pitch:1.12,rate:.9},Kavya:{lang:'ta-IN',pitch:1.18,rate:.88}};
  const doSpeak=(text,vname)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    const vm=VMAP[vname]||{lang:'en-US',pitch:1,rate:.9};
    utt.lang=vm.lang;utt.pitch=vm.pitch;utt.rate=vm.rate;utt.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const match=voices.find(v=>v.lang===vm.lang)||voices.find(v=>v.lang.startsWith(vm.lang.split('-')[0]))||voices[0];
    if(match)utt.voice=match;
    utt.onend=()=>setSpeaking(false);utt.onerror=()=>setSpeaking(false);
    window.speechSynthesis.speak(utt);
  };
  const toggleSpeak=()=>{
    if(speaking){window.speechSynthesis?.cancel();setSpeaking(false);}
    else{
      setSpeaking(true);
      if(!window.speechSynthesis)return;
      if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=()=>doSpeak(scriptVal,voice?.name||'David');}
      else doSpeak(scriptVal,voice?.name||'David');
    }
  };
  useEffect(()=>{if(screen!=='video'){window.speechSynthesis?.cancel();setSpeaking(false);}},[screen]);

  // Groq script
  const genScript=async()=>{
    if(!title.trim())return;setSLoad(true);setScriptErr('');
    const prompt=sLang==='Tamil'
      ?`${title} என்ற தலைப்பில் 30-60 வினாடி பேசக்கூடிய ஒரு தமிழ் speech script எழுதுங்கள். script வரிகள் மட்டும் கொடுங்கள்.`
      :`Write a 30-60 second professional speech script about "${title}". Return only the script sentences, no titles, asterisks, or labels.`;
    try{
      const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
        body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:'You are a professional scriptwriter. Return only the script text.'},{role:'user',content:prompt}],temperature:.8,max_tokens:400})
      });
      const data=await resp.json();
      if(!resp.ok){setScriptErr((data?.error?.message)||'Groq error '+resp.status);setSLoad(false);return;}
      const txt=data?.choices?.[0]?.message?.content?.trim()||'';
      if(!txt){setScriptErr('Empty response. Please try again.');setSLoad(false);return;}
      setSV(txt);setScriptErr('');setScreen('script');
    }catch(err){setScriptErr('Network error: '+err.message+'. Open from a web server for API calls.');}
    setSLoad(false);
  };

  const startGen=()=>{setScreen('generating');setProg(0);setSpeaking(false);setMp4Done(false);progRef.current=setInterval(()=>{setProg(p=>{if(p>=100){clearInterval(progRef.current);setScreen('video');return 100;}return p+2;});},55);};

  // MP4 canvas recorder
  const downloadMP4=async()=>{
    setMp4Load(true);setMp4Prog(0);setMp4Done(false);
    window.speechSynthesis?.cancel();setSpeaking(false);
    const W=640,H=480;
    const canvas=document.createElement('canvas');
    canvas.width=W;canvas.height=H;
    canvas.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:.01;pointer-events:none;';
    document.body.appendChild(canvas);
    const ctx=canvas.getContext('2d');
    const draw=(elapsed,duration,mOpen,t)=>{
      const skin=SKINS[cfg.skinTone]||'#F1C27D',hair=HAIRS[cfg.hairColor]||'#1C1C1C';
      const fem=cfg.gender==='Female',cx=W/2,topY=38,sc=.82,s=v=>v*sc;
      const prog2=Math.min(elapsed/duration,1);
      // BG
      ctx.fillStyle='#0A1328';ctx.fillRect(0,0,W,H);
      const g=ctx.createLinearGradient(W*.3,0,W,H);g.addColorStop(0,'#0A1328');g.addColorStop(1,'#180A2A');
      ctx.fillStyle=g;ctx.fillRect(W*.3,0,W*.7,H);
      ctx.strokeStyle='rgba(201,168,76,.05)';ctx.lineWidth=.5;
      for(let x=0;x<W;x+=52){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=52){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      // Body
      ctx.fillStyle=fem?'#5B3A7E':'#1A2744';
      ctx.beginPath();
      ctx.moveTo(cx-s(155),H);ctx.quadraticCurveTo(cx-s(120),H-s(90),cx-s(70),H-s(118));
      ctx.quadraticCurveTo(cx-s(28),H-s(136),cx,H-s(136));
      ctx.quadraticCurveTo(cx+s(28),H-s(136),cx+s(70),H-s(118));
      ctx.quadraticCurveTo(cx+s(120),H-s(90),cx+s(155),H);
      ctx.closePath();ctx.fill();
      // Neck
      ctx.fillStyle=skin;ctx.beginPath();ctx.roundRect(cx-s(20),topY+s(218),s(40),s(46),s(10));ctx.fill();
      // Chain
      if(cfg.chain==='Gold chain'){ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx-s(40),topY+s(250));ctx.quadraticCurveTo(cx,topY+s(282),cx+s(40),topY+s(250));ctx.stroke();ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(cx,topY+s(275),s(4),0,Math.PI*2);ctx.fill();}
      else if(cfg.chain==='Silver chain'){ctx.strokeStyle='#C8C8C8';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx-s(40),topY+s(250));ctx.quadraticCurveTo(cx,topY+s(282),cx+s(40),topY+s(250));ctx.stroke();ctx.fillStyle='#C8C8C8';ctx.beginPath();ctx.arc(cx,topY+s(275),s(4),0,Math.PI*2);ctx.fill();}
      // Face
      const fg=ctx.createRadialGradient(cx,topY+s(138),s(10),cx,topY+s(138),s(100));fg.addColorStop(0,skin);fg.addColorStop(1,skin+'BB');
      ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(cx,topY+s(138),s(88),s(100),0,0,Math.PI*2);ctx.fill();
      // Hair
      ctx.fillStyle=hair;
      if(cfg.hairType==='Buzz Cut'){ctx.beginPath();ctx.ellipse(cx,topY+s(65),s(88),s(40),0,0,Math.PI*2);ctx.fill();}
      else{
        ctx.beginPath();ctx.moveTo(cx-s(88),topY+s(115));ctx.quadraticCurveTo(cx-s(84),topY+s(38),cx,topY+s(32));ctx.quadraticCurveTo(cx+s(84),topY+s(38),cx+s(88),topY+s(115));ctx.quadraticCurveTo(cx+s(78),topY+s(80),cx+s(58),topY+s(70));ctx.quadraticCurveTo(cx,topY+s(52),cx-s(58),topY+s(70));ctx.quadraticCurveTo(cx-s(78),topY+s(80),cx-s(88),topY+s(115));ctx.closePath();ctx.fill();
        if(cfg.hairType==='Long'||fem){ctx.fillRect(cx-s(90),topY+s(82),s(22),s(170));ctx.fillRect(cx+s(68),topY+s(82),s(22),s(170));}
        if(cfg.hairType==='Curly'){for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(cx-s(52)+i*s(20),topY+s(44)+i%2*s(8),s(20),0,Math.PI*2);ctx.fill();}}
      }
      // Ears
      ctx.fillStyle=skin;ctx.beginPath();ctx.ellipse(cx-s(88),topY+s(148),s(12),s(17),0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+s(88),topY+s(148),s(12),s(17),0,0,Math.PI*2);ctx.fill();
      // Eyes
      if(cfg.sunglasses==='None'){
        ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(cx-s(30),topY+s(130),s(15),s(13),0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+s(30),topY+s(130),s(15),s(13),0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(cx-s(28),topY+s(131),s(8),0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+s(32),topY+s(131),s(8),0,Math.PI*2);ctx.fill();
        ctx.fillStyle='white';ctx.beginPath();ctx.arc(cx-s(24),topY+s(128),s(2.5),0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+s(36),topY+s(128),s(2.5),0,Math.PI*2);ctx.fill();
      }else{
        const gc=cfg.sunglasses==='Aviator'?'rgba(10,20,50,.88)':cfg.sunglasses==='Round'?'rgba(10,40,20,.88)':'rgba(0,0,0,.9)';
        const gs=cfg.sunglasses==='Aviator'?'#BFA060':'#666';
        ctx.fillStyle=gc;ctx.strokeStyle=gs;ctx.lineWidth=2;
        if(cfg.sunglasses==='Round'){ctx.beginPath();ctx.arc(cx-s(30),topY+s(130),s(19),0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(cx+s(30),topY+s(130),s(19),0,Math.PI*2);ctx.fill();ctx.stroke();}
        else if(cfg.sunglasses==='Square'){ctx.beginPath();ctx.roundRect(cx-s(51),topY+s(118),s(42),s(26),4);ctx.fill();ctx.stroke();ctx.beginPath();ctx.roundRect(cx+s(9),topY+s(118),s(42),s(26),4);ctx.fill();ctx.stroke();}
        else{ctx.beginPath();ctx.ellipse(cx-s(30),topY+s(130),s(21),s(17),0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(cx+s(30),topY+s(130),s(21),s(17),0,0,Math.PI*2);ctx.fill();ctx.stroke();}
        ctx.strokeStyle=gs;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx-s(9),topY+s(129));ctx.lineTo(cx+s(9),topY+s(129));ctx.stroke();ctx.beginPath();ctx.moveTo(cx-s(90),topY+s(122));ctx.lineTo(cx-s(51),topY+s(128));ctx.stroke();ctx.beginPath();ctx.moveTo(cx+s(51),topY+s(128));ctx.lineTo(cx+s(90),topY+s(122));ctx.stroke();
      }
      // Eyebrows
      const eb=cfg.hairColor==='Blonde'?'#8B6914':hair;
      ctx.strokeStyle=eb;ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(cx-s(48),topY+s(112));ctx.quadraticCurveTo(cx-s(30),topY+s(105),cx-s(14),topY+s(111));ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+s(14),topY+s(111));ctx.quadraticCurveTo(cx+s(30),topY+s(105),cx+s(48),topY+s(112));ctx.stroke();
      // Nose
      ctx.fillStyle=skin;ctx.beginPath();ctx.moveTo(cx,topY+s(144));ctx.lineTo(cx-s(6),topY+s(162));ctx.quadraticCurveTo(cx,topY+s(167),cx+s(6),topY+s(162));ctx.closePath();ctx.fill();
      // Mouth
      if(mOpen){ctx.fillStyle='#7A1840';ctx.strokeStyle='#C06080';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(cx,topY+s(192),s(18),s(10),0,0,Math.PI*2);ctx.fill();ctx.stroke();}
      else{ctx.strokeStyle=fem?'#C06080':'#906060';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx-s(18),topY+s(192));ctx.quadraticCurveTo(cx,topY+s(202),cx+s(18),topY+s(192));ctx.stroke();}
      // Name
      if(cfg.avatarName){ctx.font='bold 13px Georgia,serif';ctx.fillStyle='#C9A84C';ctx.textAlign='center';ctx.fillText(cfg.avatarName.toUpperCase().substring(0,14),cx,topY+s(300));}
      // Title bar
      ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,30);ctx.strokeStyle='rgba(201,168,76,.2)';ctx.lineWidth=.5;ctx.strokeRect(0,0,W,30);
      ctx.font='500 12px sans-serif';ctx.fillStyle='rgba(237,232,223,.9)';ctx.textAlign='center';ctx.fillText(title.substring(0,58),W/2,19);
      // Waveform
      const wY=H-82,bars=20,gap=9,wl=(W-bars*gap)/2;
      for(let i=0;i<bars;i++){const bh=mOpen?(4+Math.abs(Math.sin(t/100+i*.7))*15):3;ctx.fillStyle=`rgba(201,168,76,${.3+Math.abs(Math.sin(t/150+i))*.5})`;ctx.fillRect(wl+i*gap,wY-bh/2,3,bh);}
      // Ticker
      ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,H-42,W,42);ctx.strokeStyle='rgba(201,168,76,.18)';ctx.lineWidth=.5;ctx.strokeRect(0,H-42,W,42);
      const scroll=((elapsed/1000)*55)%(W+scriptVal.length*7.5);
      ctx.font='11px sans-serif';ctx.fillStyle='rgba(237,232,223,.8)';ctx.textAlign='left';ctx.fillText(scriptVal,W-scroll,H-18);
      ctx.font='10px sans-serif';ctx.fillStyle='rgba(201,168,76,.75)';ctx.fillText((voice?.name||'')+' · '+(voice?.lang||''),10,H-5);
      // Progress
      ctx.fillStyle='rgba(201,168,76,.15)';ctx.fillRect(0,H-4,W,4);ctx.fillStyle='rgba(201,168,76,.88)';ctx.fillRect(0,H-4,W*prog2,4);
    };
    // ── Audio: Web Audio API speech synthesis capture ──
    const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const audioDest=audioCtx.createMediaStreamDestination();

    // Create voice-like oscillator speech sound
    const makeSpeechAudio=()=>{
      const words=scriptVal.trim().split(/\s+/);
      const wpm=130,secPerWord=60/wpm;
      let time=audioCtx.currentTime+0.1;
      words.forEach((word,wi)=>{
        // Each word = short voiced oscillator burst
        const osc=audioCtx.createOscillator();
        const gain=audioCtx.createGain();
        const filter=audioCtx.createBiquadFilter();
        filter.type='bandpass';
        filter.frequency.value=180+Math.sin(wi*0.7)*60; // voice formant range
        filter.Q.value=2;
        osc.type='sawtooth';
        osc.frequency.value=140+Math.sin(wi*1.3)*30; // natural pitch variation
        osc.frequency.setValueAtTime(osc.frequency.value,time);
        osc.frequency.linearRampToValueAtTime(osc.frequency.value*1.05,time+secPerWord*0.4);
        osc.frequency.linearRampToValueAtTime(osc.frequency.value*0.95,time+secPerWord*0.8);
        gain.gain.setValueAtTime(0,time);
        gain.gain.linearRampToValueAtTime(0.12,time+0.02);
        gain.gain.setValueAtTime(0.12,time+secPerWord*0.75);
        gain.gain.linearRampToValueAtTime(0,time+secPerWord*0.9);
        osc.connect(filter);filter.connect(gain);gain.connect(audioDest);
        osc.start(time);osc.stop(time+secPerWord*0.9);
        time+=secPerWord;
        // Add brief silence between words
        if(wi<words.length-1)time+=secPerWord*0.15;
      });
    };
    makeSpeechAudio();

    // Combine canvas video + audio into one stream
    const videoStream=canvas.captureStream(30);
    const combinedStream=new MediaStream([
      ...videoStream.getVideoTracks(),
      ...audioDest.stream.getAudioTracks()
    ]);

    const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'].find(t=>MediaRecorder.isTypeSupported(t))||'video/webm';
    const rec=new MediaRecorder(combinedStream,{mimeType:mime,videoBitsPerSecond:2000000,audioBitsPerSecond:128000});
    const chunks=[];
    rec.ondataavailable=ev=>{if(ev.data&&ev.data.size>0)chunks.push(ev.data);};
    rec.onstop=()=>{
      document.body.removeChild(canvas);
      audioCtx.close();
      const blob=new Blob(chunks,{type:mime});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=(title.replace(/[^a-zA-Z0-9]/g,'_').substring(0,28)||'avaforge')+'.'+(mime.includes('mp4')?'mp4':'webm');
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      setMp4Load(false);setMp4Prog(100);setMp4Done(true);setTimeout(()=>setMp4Done(false),5000);
    };
    const words2=scriptVal.trim().split(/\s+/).length;
    const duration=Math.max(8000,Math.min(45000,Math.round((words2/130)*60000)));
    const t0=performance.now();let mOpen=false,cnt=0;
    rec.start(100);
    const iv=setInterval(()=>{
      const now=performance.now(),el=now-t0;
      cnt++;if(cnt%4===0)mOpen=!mOpen;
      draw(el,duration,mOpen,now);
      setMp4Prog(Math.min(95,Math.floor((el/duration)*95)));
      if(el>=duration){clearInterval(iv);rec.stop();}
    },33);
  };

  const publish=async()=>{
    const{data}=await db.from('videos').insert({user_id:authUser.id,title,script:scriptVal,voice_name:voice?.name||'David',language:voice?.lang||'English',config:cfg}).select().single();
    if(data)setVideos(arr=>[mapV(data),...arr]);
    setScreen('home');setTitle('');setSV('');setVoice(null);setCfg({...DEF});setSpeaking(false);setMp4Done(false);setScriptMode(null);
  };

  useEffect(()=>()=>clearInterval(progRef.current),[]);
  const inFlow=['title','script','customize','voice','generating','video'].includes(screen);
  const stepIdx=SIDX[screen]??-1;

  // Profile screen
  if(screen==='profile'){
    return e(ProfileScreen,{profile,authUser,videos,setProfile,setScreen,onLogout});
  }
  // Explore screen
  if(screen==='explore'){
    return e(ExploreScreen,{profile,setScreen,onLogout});
  }

  return e('div',null,
    e(NavBar,{profile,screen,setScreen,onLogout}),

    // HOME
    screen==='home'&&e('div',{className:'fadein'},
      e('div',{className:'home-hero'},
        e('div',{className:'tag',style:{marginBottom:16}},'Welcome back, '+(profile?.name?.split(' ')[0]||'there')+' 👋'),
        e('h1',{className:'home-h1'},'Bring Your Words',e('br'),'to Life'),
        e('p',{className:'home-sub'},'Create AI avatar videos with Groq-generated scripts in English and Tamil.'),
        e('div',{style:{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}},
          e('button',{className:'btn-gold',style:{padding:'12px 30px'},onClick:()=>setScreen('title')},'▶  Create Avatar Video'),
          e('button',{className:'btn-outline',onClick:()=>setScreen('explore')},'🔭  Explore Features')
        )
      ),
      e('div',{className:'stats-strip'},
        [['⚡','AI Scripts','English & Tamil'],['🎨','8 Styles','Full customization'],['🎙️','8 Voices','Male & female'],['🗄️','Supabase','All data saved']].map(([ic,t,d])=>
          e('div',{key:t,style:{textAlign:'center'}},e('div',{className:'ss-icon'},ic),e('div',{className:'ss-title'},t),e('div',{className:'ss-desc'},d))
        )
      ),
      playingVid&&e(VideoModal,{vid:playingVid,onClose:()=>setPlayingVid(null)}),
      e('div',{className:'sh'},e('div',{className:'sh-title'},'Community Videos'),e('div',{className:'sh-sub'},vLoad?'Loading from Supabase…':videos.length+' video'+(videos.length!==1?'s':'')+' published')),
      vLoad?e('div',{style:{textAlign:'center',padding:28,color:'var(--td)',fontSize:13}},'⏳ Loading…')
           :videos.length===0?e('div',{style:{textAlign:'center',padding:28,color:'var(--td)',fontSize:13}},'No videos yet. ',e('span',{style:{color:'var(--gold)',cursor:'pointer'},onClick:()=>setScreen('title')},'Be the first →'))
           :e('div',{className:'vids-grid'},videos.map(v=>
              e('div',{key:v.id,className:'vid-card',onClick:()=>setPlayingVid(v)},
                e('div',{className:'vid-thumb'},
                  e(AvatarSVG,{cfg:v.config,size:76}),
                  e('div',{className:'vid-lang'},v.lang),
                  e('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .2s',background:'rgba(0,0,0,.35)'},className:'play-overlay'},
                    e('div',{style:{width:38,height:38,borderRadius:'50%',background:'rgba(201,168,76,.85)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,color:'#050810'}},'▶')
                  )
                ),
                e('div',{className:'vid-body'},
                  e('div',{className:'vid-t'},v.title),
                  e('div',{className:'vid-s'},(v.script||'').substring(0,64)+'…'),
                  e('div',{className:'vid-meta'},e('span',null,'🎙️ ',v.voiceName),e('span',{style:{color:'var(--td)'}},v.config?.gender))
                )
              )
            ))
    ),

    // CREATE FLOW
    inFlow&&e('div',{className:'flow-wrap fadein'},
      screen!=='generating'&&e('div',{className:'steps-bar'},
        STEPS.map((s,i)=>e(Fragment,{key:s},
          e('div',{className:'sn'+(i===stepIdx?' active':i<stepIdx?' done':'')},
            e('div',{className:'sdot'},i<stepIdx?'✓':i+1),e('span',null,s)
          ),
          i<STEPS.length-1&&e('div',{className:'sdash'})
        ))
      ),

      // TITLE
      screen==='title'&&e('div',{className:'fadein'},

        // STEP 1 — Choose how to create script
        !scriptMode&&e('div',{className:'card'},

function VideoModal({vid,onClose}){
  const [speaking,setSpeaking]=useState(false);
  const VMAP2={David:{lang:'en-US',pitch:.95,rate:.92},James:{lang:'en-GB',pitch:.88,rate:.9},Emma:{lang:'en-US',pitch:1.15,rate:.94},Sophie:{lang:'en-GB',pitch:1.18,rate:.92},Arjun:{lang:'ta-IN',pitch:.9,rate:.88},Kumar:{lang:'ta-IN',pitch:.85,rate:.86},Priya:{lang:'ta-IN',pitch:1.12,rate:.9},Kavya:{lang:'ta-IN',pitch:1.18,rate:.88}};
  const WAVE_H2=[8,16,22,14,20,10,18,24,12,20,16,8];
  const doSpeak2=()=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(vid.script||'');
    const vm=VMAP2[vid.voiceName]||{lang:'en-US',pitch:1,rate:.9};
    utt.lang=vm.lang;utt.pitch=vm.pitch;utt.rate=vm.rate;utt.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const match=voices.find(v=>v.lang===vm.lang)||voices.find(v=>v.lang.startsWith(vm.lang.split('-')[0]))||voices[0];
    if(match)utt.voice=match;
    utt.onend=()=>setSpeaking(false);utt.onerror=()=>setSpeaking(false);
    window.speechSynthesis.speak(utt);
  };
  const toggleSpeak2=()=>{
    if(speaking){window.speechSynthesis?.cancel();setSpeaking(false);}
    else{setSpeaking(true);if(!window.speechSynthesis)return;if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=doSpeak2;}else doSpeak2();}
  };
  useEffect(()=>()=>{window.speechSynthesis?.cancel();},[]);
  return e('div',{className:'vid-modal-overlay',onClick:ev=>{if(ev.target.className==='vid-modal-overlay')onClose();}},
    e('div',{className:'vid-modal fadein'},
      e('div',{className:'vid-modal-bar'},
        e('div',{className:'vid-modal-title'},vid.title),
        e('button',{className:'vid-modal-close',onClick:onClose},'✕')
      ),
      e('div',{className:'vid-modal-stage'},
        e(AvatarSVG,{cfg:vid.config||DEF,speaking,size:130}),
        e('div',{className:'vid-modal-ctls'},
          e('button',{className:'play-btn'+(speaking?' on':''),onClick:toggleSpeak2},speaking?'⏸':'▶'),
          speaking&&e('div',{className:'waveform'},WAVE_H2.map((h,i)=>e('div',{key:i,className:'wbar',style:{height:h,animation:`wavebar ${.35+i%3*.15}s ease-in-out ${i*.06}s infinite alternate`}}))),
          e('span',{style:{fontSize:11,color:'rgba(237,232,223,.55)'}},'🎙️ ',vid.voiceName,' · ',vid.lang)
        )
      ),
      speaking&&e('div',{className:'vid-modal-ticker'},e('span',{className:'ticker-txt'},vid.script||'')),
      e('div',{className:'vid-modal-script'},vid.script||''),
      e('div',{className:'vid-modal-meta'},
        e('span',null,'🎙️ ',vid.voiceName,' (',vid.lang,')'),
        e('span',{style:{color:'var(--gold)'}},vid.config?.gender||'')
      )
    )
  );
}

/* ── App ── */
function App(){
  const [authUser,setAU]=useState(null);
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [authScreen,setAS]=useState(null);

  useEffect(()=>{
    const t=setTimeout(()=>setLoading(false),4000);
    (async()=>{
      try{
        const res=await Promise.race([db.auth.getSession(),new Promise(r=>setTimeout(()=>r({data:{session:null}}),3500))]);
        const session=res?.data?.session;
        if(session?.user){setAU(session.user);const p=await fetchProfile(session.user.id);setProfile(p||null);}
      }catch(err){console.warn('Auth:',err);}
      finally{clearTimeout(t);setLoading(false);}
    })();
    let unsub=null;
    try{const{data}=db.auth.onAuthStateChange(async(ev,session)=>{try{if(session&&(ev==='SIGNED_IN'||ev==='TOKEN_REFRESHED')){setAU(session.user);const p=await fetchProfile(session.user.id);setProfile(p||null);setAS(null);}else if(ev==='SIGNED_OUT'){setAU(null);setProfile(null);}}catch{}});unsub=data?.subscription;}catch{}
    return()=>{clearTimeout(t);try{unsub?.unsubscribe();}catch{}};
  },[]);

  const handleLogout=async()=>{try{await db.auth.signOut();}catch{}setAU(null);setProfile(null);setAS(null);};
  const handleLogin=(u,p)=>{setAU(u);setProfile(p);setAS(null);};

  if(loading)return e('div',{className:'load-full'},
    e('div',{className:'logo',style:{fontSize:30,fontFamily:'Cormorant Garamond,serif'}},'AvaForge'),
    e('div',{className:'spinner'}),
    e('div',{style:{fontSize:12,color:'var(--td)',marginTop:4}},'Loading AvaForge…')
  );
  if(authScreen)return e(AuthPage,{startTab:authScreen,onLogin:handleLogin});
  if(!authUser||!profile)return e(Landing,{onLogin:tab=>setAS(tab)});
  return e(Studio,{authUser,profile,setProfile,onLogout:handleLogout});
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
<style>@keyframes wavebar{0%{height:4px}100%{height:22px}}</style>
</body>
